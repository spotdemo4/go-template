name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# yaml-language-server-disable is not allowed
enable-openid-connect: true

jobs:
  linux:
    # zizmor: ignore[excessive-permissions]
    runs-on: ubuntu-24.04
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@a381c8e0765c98cb84fdc4a392eefd6c4db309a5 # v1.57.0
        with:
          token: ${{ secrets.DOCTOR_TOKEN }}
          github_token: ${{ secrets.GH_TOKEN }}
          niks3_url: https://niks3.trev.zip
          fetch_depth: 0
          shell: release

      - name: Release to Forgejo
        run: flake-release
        env:
          GITHUB_TOKEN: ${{ secrets.DOCTOR_TOKEN }}
          REGISTRY: trev.zip
          REGISTRY_PASSWORD: ${{ secrets.PACKAGE_TOKEN }}
          DELETE_OLD_RELEASE_ARTIFACTS: true
          PACKAGES: |
            packages.x86_64-linux.default.x86_64-unknown-linux-musl
            packages.x86_64-linux.default.aarch64-unknown-linux-musl
            packages.x86_64-linux.default.armv7l-unknown-linux-musleabihf
            packages.x86_64-linux.default.x86_64-w64-mingw32
            images.x86_64-linux.default.x86_64-unknown-linux-musl
            images.x86_64-linux.default.aarch64-unknown-linux-musl
            images.x86_64-linux.default.armv7l-unknown-linux-musleabihf

      - name: Release to proxy
        run: |
          set -euo pipefail

          module="$(go list -m)"
          version="${GITHUB_REF_NAME}"
          cache="$(mktemp -d)"
          metadata="${cache}/module.json"

          GOMODCACHE="${cache}/mod" \
            GONOSUMDB="${module}" \
            GOPRIVATE="${module}" \
            GOPROXY=direct \
            go mod download -json "${module}@${version}" > "${metadata}"

          archive="$(jq -r .Zip "${metadata}")"
          test -n "${archive}"
          test "${archive}" != "null"

          curl --fail-with-body \
            --request PUT \
            --header "Authorization: token ${FORGEJO_TOKEN}" \
            --upload-file "${archive}" \
            "${FORGEJO_GO_UPLOAD_URL}"
        env:
          FORGEJO_GO_UPLOAD_URL: ${{ forgejo.SERVER_URL }}/api/packages/${{ forgejo.REPOSITORY_OWNER }}/go/upload
          FORGEJO_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
