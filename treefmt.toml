#:schema https://www.schemastore.org/treefmt.json

[formatter.gofmt]
command = "gofmt"
includes = ["*.go"]

[formatter.oxfmt]
command = "oxfmt"
options = ["--write"]
includes = ["*.ts", "*.tsx", "*.html", "*.css", "*.json", "*.yaml", "*.toml", "*.md"]

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]
